<div id="page-notifications" class="page active">
  <div class="page-content">
    <div class="page-header page-header-row">
      <div><h1>Notifications</h1><p>Stay updated with all your activities</p></div>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="badge badge-info" id="unread-count-badge">2 Unread</span>
        <button class="btn btn-outline btn-sm" onclick="TenantLogic.markAllRead()">Mark All as Read</button>
      </div>
    </div>
    <div class="grid-4 mb-20">
      <div class="stat-card"><div class="stat-label">Total <span class="stat-icon">🔔</span></div><div class="stat-value" id="notif-page-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Unread <span class="stat-icon">🔔</span></div><div class="stat-value" id="notif-page-unread" style="color:var(--primary)">0</div></div>
    </div>
    <div class="section-card">
      <div class="section-header"><span class="section-title">All Notifications</span></div>
      <div id="notifs-list"></div>
    </div>
  </div>
</div>
