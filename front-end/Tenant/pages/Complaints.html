<div id="page-complaints" class="page active">
  <div class="page-content">
    <div class="page-header page-header-row">
      <div><h1>Complaints</h1><p>Manage and track your complaints</p></div>
      <button class="btn btn-primary" onclick="UI.openModal('complaint-modal')">+ File New Complaint</button>
    </div>
    <div class="grid-4 mb-20">
      <div class="stat-card"><div class="stat-label">Total Complaints</div><div class="stat-value" id="cmp-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Open <span class="stat-icon">🔴</span></div><div class="stat-value" id="cmp-open" style="color:var(--danger)">0</div></div>
      <div class="stat-card"><div class="stat-label">In Progress <span class="stat-icon">🕐</span></div><div class="stat-value" id="cmp-inprog" style="color:var(--warning)">0</div></div>
      <div class="stat-card"><div class="stat-label">Resolved <span class="stat-icon">✅</span></div><div class="stat-value" id="cmp-resolved" style="color:var(--success)">0</div></div>
    </div>
    <div id="complaints-list"></div>
  </div>
</div>
