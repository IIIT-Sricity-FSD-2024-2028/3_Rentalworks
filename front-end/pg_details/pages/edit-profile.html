<div class="page-content" style="max-width: 600px;">

    <!-- Back Button -->
    <button class="btn-back" id="edit-profile-back-btn" onclick="Navigation.navigate('landing')">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        Back
    </button>

    <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 24px;">Edit Profile</h2>
    
    <div class="modern-card" style="margin-bottom: 24px;">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 32px;">
            <img id="edit-profile-avatar" src="https://ui-avatars.com/api/?name=User&background=ca8a04&color=fff" style="width: 72px; height: 72px; border-radius: 50%;">
            <button class="btn btn-outline" style="padding: 8px 16px; font-size: 13px;">Change Photo</button>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 8px;">Full Name</label>
            <input type="text" id="edit-name" class="input-field" value="Guest User">
        </div>
        
        <div style="margin-bottom: 24px;">
            <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 8px;">Email Address</label>
            <input type="email" id="edit-email" class="input-field" value="email@example.com" readonly style="background: var(--bg-main); color: var(--text-gray); cursor: not-allowed;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 8px;">Phone Number</label>
            <input type="tel" id="edit-phone" class="input-field" placeholder="Enter your phone number">
        </div>

        <div style="margin-bottom: 24px;">
            <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 8px;">Permanent Address</label>
            <textarea id="edit-address" class="input-field" rows="3" placeholder="Enter your full address"></textarea>
        </div>
        
        <button class="btn btn-primary" onclick="Auth.saveProfile()">Save Changes</button>
    </div>


</div>
