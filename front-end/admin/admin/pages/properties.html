<section id="properties-sec" class="section active">
  <div class="sec-hdr">
    <h2>PG Property Management</h2>
    <p>Manage listings, onboarding pipeline and property approvals</p>
  </div>

  <!-- Summary KPIs -->
  <div class="prop-summary">
    <div class="u-sum-card"><div class="u-sum-label">Total Properties</div><div class="u-sum-val" id="prop-total">–</div></div>
    <div class="u-sum-card"><div class="u-sum-label">Approved</div><div class="u-sum-val green" id="prop-approved">–</div></div>
    <div class="u-sum-card"><div class="u-sum-label">Pending Pipeline</div><div class="u-sum-val" style="color:#d97706" id="prop-pending">–</div></div>
    <div class="u-sum-card"><div class="u-sum-label">Rejected</div><div class="u-sum-val red" id="prop-rejected">–</div></div>
  </div>

  <!-- Search + Add -->
  <div class="tbl-hdr" style="background:white;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:16px">
    <div class="search-wrap">
      <span class="s-ico">🔍</span>
      <input type="text" id="prop-search" placeholder="Search by property name, owner, or location..."/>
    </div>
    <button class="btn-add" onclick="addProperty()">+ Add Property</button>
  </div>

  <!-- Property Cards Grid -->
  <div class="prop-grid" id="prop-grid"></div>
</section>
